<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Audit History | Admin | Badminton Manager Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900">

    <nav class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex items-center gap-3">
        <a href="admin.html" class="p-1 hover:bg-blue-700 rounded-full transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </a>
        <h1 class="font-black tracking-tight text-lg uppercase">Audit History</h1>
    </nav>

    <div class="container mx-auto p-4 max-w-lg space-y-4">
        <h2 class="text-xl font-black mb-2">Audit History</h2>

        <div class="bg-white p-4 rounded-3xl border border-gray-100 shadow-sm space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="text-[9px] font-black text-gray-400 uppercase ml-1">From Date</label>
                    <input type="date" id="audit-from-date" class="w-full bg-gray-50 p-2.5 rounded-xl border-none ring-1 ring-gray-200 outline-none text-xs">
                </div>
                <div>
                    <label class="text-[9px] font-black text-gray-400 uppercase ml-1">To Date</label>
                    <input type="date" id="audit-to-date" class="w-full bg-gray-50 p-2.5 rounded-xl border-none ring-1 ring-gray-200 outline-none text-xs">
                </div>
            </div>
            <div>
                <label class="text-[9px] font-black text-gray-400 uppercase ml-1">Action Type</label>
                <select id="audit-action-select" class="w-full bg-gray-50 p-3 rounded-xl border-none ring-1 ring-gray-200 outline-none text-xs font-bold text-gray-700">
                    <option value="ALL">All Actions</option>
                </select>
            </div>
            <div>
                <label class="text-[9px] font-black text-gray-400 uppercase ml-1">Search (Player / Details)</label>
                <input type="text" id="audit-search" placeholder="Type to search..."
                    class="w-full bg-gray-50 p-2.5 rounded-xl border-none ring-1 ring-gray-200 outline-none text-xs">
            </div>
            <button id="audit-clear-filters-btn" class="w-full text-[10px] font-black text-gray-400 uppercase tracking-widest py-1 hover:text-blue-600 transition-colors">
                Clear All Filters
            </button>
        </div>

        <p id="audit-result-count" class="text-[10px] font-black text-gray-400 uppercase ml-1"></p>

        <div id="list-audit" class="space-y-2 max-h-[500px] overflow-y-auto pr-2"></div>
    </div>

    <script type="module">
        import { requireAdmin } from './js/auth-guard.js';
        import { _supabase } from './js/supabase-client.js';

        if (!requireAdmin()) throw new Error('Not authenticated');

        let allLogs = [];

        function populateActionDropdown() {
            const distinctActions = Array.from(new Set(allLogs.map(l => l.action))).sort();
            const select = document.getElementById('audit-action-select');
            const optionsHtml = distinctActions.map(a => `<option value="${a}">${a.replace(/_/g, ' ')}</option>`).join('');
            select.innerHTML = `<option value="ALL">All Actions</option>${optionsHtml}`;
        }

        function filterAndRenderLogs() {
            const fromVal = document.getElementById('audit-from-date').value;
            const toVal = document.getElementById('audit-to-date').value;
            const actionFilter = document.getElementById('audit-action-select').value;
            const searchVal = document.getElementById('audit-search').value.trim().toLowerCase();

            const startBound = fromVal ? new Date(fromVal).setHours(0, 0, 0, 0) : null;
            const endBound = toVal ? new Date(toVal).setHours(23, 59, 59, 999) : null;

            const filtered = allLogs.filter(log => {
                const t = new Date(log.created_at).getTime();
                if (startBound && t < startBound) return false;
                if (endBound && t > endBound) return false;
                if (actionFilter !== 'ALL' && log.action !== actionFilter) return false;

                if (searchVal) {
                    const haystack = `${log.details || ''} ${log.player_name || ''}`.toLowerCase();
                    if (!haystack.includes(searchVal)) return false;
                }

                return true;
            });

            document.getElementById('audit-result-count').innerText = `${filtered.length} record${filtered.length !== 1 ? 's' : ''}`;

            document.getElementById('list-audit').innerHTML = filtered.map(log => `
                <div class="bg-white p-3 rounded-xl border border-gray-50 text-xs mb-2 shadow-sm">
                    <div class="flex justify-between mb-1">
                        <span class="font-black text-blue-600 uppercase">${log.action.replace(/_/g, ' ')}</span>
                        <span class="text-gray-300">${new Date(log.created_at).toLocaleDateString()} ${new Date(log.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                    </div>
                    <p class="text-gray-600">${log.details}</p>
                    ${log.player_name ? `<p class="text-[10px] font-bold text-gray-400 mt-1">Player: ${log.player_name}</p>` : ''}
                </div>`).join('') || '<p class="text-center text-gray-400 italic py-8">No logs match those filters</p>';
        }

        document.getElementById('audit-from-date').addEventListener('change', filterAndRenderLogs);
        document.getElementById('audit-to-date').addEventListener('change', filterAndRenderLogs);
        document.getElementById('audit-action-select').addEventListener('change', filterAndRenderLogs);
        document.getElementById('audit-search').addEventListener('input', filterAndRenderLogs);

        document.getElementById('audit-clear-filters-btn').addEventListener('click', () => {
            document.getElementById('audit-from-date').value = '';
            document.getElementById('audit-to-date').value = '';
            document.getElementById('audit-action-select').value = 'ALL';
            document.getElementById('audit-search').value = '';
            filterAndRenderLogs();
        });

        (async () => {
            // NOTE: previously capped at .limit(50), which silently hid older
            // rows from any filter. Raised to 2000 so date-range filtering
            // actually searches full history rather than just the most recent
            // page. Revisit this cap if your log volume grows past it.
            const { data, error } = await _supabase
                .from('audit_logs')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(2000);

            if (error) {
                document.getElementById('list-audit').innerHTML = '<p class="text-center text-red-500 font-bold py-8">Error loading audit log</p>';
                return;
            }

            allLogs = data || [];
            populateActionDropdown();
            filterAndRenderLogs();
        })();
    </script>
</body>
</html>
