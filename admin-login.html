<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Admin Login | Badminton Manager Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900 flex items-center justify-center p-4">

    <div class="w-full max-w-sm bg-white rounded-3xl shadow-xl p-8 space-y-6 text-center">
        <h1 class="font-black tracking-tight text-xl uppercase">🏸 Admin Access</h1>
        <p class="text-xs text-gray-400">Enter the admin password to continue.</p>

        <div class="space-y-3">
            <input type="password" id="admin-password-input" placeholder="Admin password"
                class="w-full bg-gray-50 p-3 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500 outline-none text-sm text-center"
                onkeydown="if(event.key==='Enter') document.getElementById('login-btn').click()">
            <button id="login-btn" class="w-full bg-blue-600 text-white font-black py-3 rounded-2xl uppercase tracking-widest text-xs">
                Log In
            </button>
        </div>

        <a href="index.html" class="block text-[10px] text-gray-400 uppercase font-bold tracking-widest">← Back to player view</a>
    </div>

    <script type="module">
        import { _supabase } from './js/supabase-client.js';

        // If already logged in, skip straight to the redirect target (or
        // the admin dashboard) instead of asking for the password again.
        const isAdmin = localStorage.getItem('isAdmin') === 'true';
        const adminName = localStorage.getItem('adminName');
        const params = new URLSearchParams(window.location.search);
        const redirectTo = params.get('redirect') || 'admin.html';

        if (isAdmin && adminName) {
            window.location.href = redirectTo;
        }

        async function attemptLogin() {
            const password = document.getElementById('admin-password-input').value;
            if (!password) return;

            // NOTE: this checks the password by querying a row out of
            // app_settings using the public anon key. Because the table is
            // readable client-side, this is a convenience gate rather than
            // real authentication — anyone inspecting network traffic can
            // see the query and, depending on RLS policy, potentially the
            // password value itself. This pre-dates the multi-page
            // conversion and wasn't part of the requested change, but is
            // worth hardening separately (e.g. move the check into a
            // Supabase Edge Function instead of a direct table query).
            const { data, error } = await _supabase
                .from('app_settings')
                .select('value, name')
                .eq('key', 'admin_password')
                .eq('value', password)
                .maybeSingle();

            if (error) {
                Swal.fire('Error', 'Verification system error', 'error');
                return;
            }

            if (data) {
                localStorage.setItem('isAdmin', 'true');
                localStorage.setItem('adminName', data.name);
                window.location.href = redirectTo;
            } else {
                Swal.fire('Access Denied', 'Incorrect password', 'error');
            }
        }

        document.getElementById('login-btn').addEventListener('click', attemptLogin);
    </script>
</body>
</html>
