<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Player Profile | Admin | Badminton Manager Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900">

    <nav class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex items-center gap-3">
        <a href="admin-players.html" class="p-1 hover:bg-blue-700 rounded-full transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </a>
        <h1 class="font-black tracking-tight text-lg uppercase" id="nav-title">Player Profile</h1>
    </nav>

    <div class="container mx-auto p-4 max-w-lg space-y-4">

        <div id="loading-state" class="text-center py-16 text-gray-400 font-bold uppercase text-[10px]">Loading player...</div>
        <div id="error-state" class="hidden text-center py-16 text-red-400 font-bold">Player not found.</div>

        <div id="profile-content" class="hidden space-y-4">
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-5">
                <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest">Player</p>
                <h2 id="player-name-header" class="text-2xl font-black text-gray-900"></h2>
            </div>

            <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-4">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-xs font-black text-gray-700 uppercase">Notes</span>
                    <a id="manage-notes-link" href="#" class="text-[10px] font-black text-blue-600 uppercase">Manage Notes →</a>
                </div>
                <div id="profile-notes-list" class="space-y-2 max-h-56 overflow-y-auto pr-1"></div>
            </div>

            <div class="bg-white p-4 rounded-3xl border border-gray-100 shadow-sm space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[9px] font-black text-gray-400 uppercase ml-1">From Date</label>
                        <input type="date" id="profile-from-date" class="w-full bg-gray-50 p-2.5 rounded-xl border-none ring-1 ring-gray-200 outline-none text-xs">
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-gray-400 uppercase ml-1">To Date</label>
                        <input type="date" id="profile-to-date" class="w-full bg-gray-50 p-2.5 rounded-xl border-none ring-1 ring-gray-200 outline-none text-xs">
                    </div>
                </div>
                <button id="profile-clear-filters-btn" class="w-full text-[10px] font-black text-gray-400 uppercase tracking-widest py-1 hover:text-blue-600 transition-colors">
                    Clear Filters (Show All-Time)
                </button>
            </div>

            <p id="profile-range-label" class="text-[10px] font-black text-gray-400 uppercase ml-1"></p>

            <div class="grid grid-cols-3 gap-2">
                <div class="bg-white border border-gray-100 p-3 rounded-2xl shadow-sm text-center">
                    <p class="text-[8px] font-bold text-gray-400 uppercase tracking-wide">Games Played</p>
                    <span id="stat-games-played" class="text-xl font-black text-blue-600">0</span>
                </div>
                <div class="bg-white border border-gray-100 p-3 rounded-2xl shadow-sm text-center">
                    <p class="text-[8px] font-bold text-gray-400 uppercase tracking-wide">Infractions</p>
                    <span id="stat-infraction-count" class="text-xl font-black text-red-500">0</span>
                </div>
                <div class="bg-white border border-gray-100 p-3 rounded-2xl shadow-sm text-center">
                    <p class="text-[8px] font-bold text-gray-400 uppercase tracking-wide">On-Time Pay %</p>
                    <span id="stat-ontime-pct" class="text-xl font-black text-green-600">0%</span>
                </div>
            </div>

            <div class="bg-white rounded-3xl border border-gray-100 shadow-sm">
                <div class="p-4 flex justify-between items-center">
                    <span class="text-xs font-black text-gray-700 uppercase">Upcoming Sessions</span>
                    <span id="upcoming-count-badge" class="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">0</span>
                </div>
                <div id="upcoming-sessions-list" class="divide-y divide-gray-50 px-4 pb-4"></div>
            </div>

            <div class="bg-white rounded-3xl border border-gray-100 shadow-sm">
                <button id="toggle-infractions-btn" class="w-full flex justify-between items-center p-4 text-left">
                    <span class="text-xs font-black text-gray-700 uppercase">Infraction History</span>
                    <span id="infractions-chevron" class="text-gray-300 text-xs">+ Show</span>
                </button>
                <div id="infractions-list" class="hidden divide-y divide-gray-50 px-4 pb-4"></div>
            </div>

            <div class="bg-white rounded-3xl border border-gray-100 shadow-sm">
                <button id="toggle-sessions-btn" class="w-full flex justify-between items-center p-4 text-left">
                    <span class="text-xs font-black text-gray-700 uppercase">Sessions Played</span>
                    <span id="sessions-chevron" class="text-gray-300 text-xs">- Hide</span>
                </button>
                <div id="sessions-list" class="divide-y divide-gray-50 px-4 pb-4"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { requireAdmin } from './js/auth-guard.js';
        import { _supabase } from './js/supabase-client.js';
        import { formatDateWithDay, formatTime12Hour } from './js/format.js';

        if (!requireAdmin()) throw new Error('Not authenticated');

        // Raw, unfiltered data fetched once on load. All stats/lists are
        // recomputed from these on every filter change rather than re-fetched.
        let allSessionRows = [];
        let allInfractionRows = [];

        function showError() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('error-state').classList.remove('hidden');
        }

        function getDateBounds() {
            const fromVal = document.getElementById('profile-from-date').value;
            const toVal = document.getElementById('profile-to-date').value;
            return {
                startBound: fromVal ? new Date(fromVal).setHours(0, 0, 0, 0) : null,
                endBound: toVal ? new Date(toVal).setHours(23, 59, 59, 999) : null
            };
        }

        function withinBounds(dateStr, startBound, endBound) {
            const t = new Date(dateStr).getTime();
            if (startBound && t < startBound) return false;
            if (endBound && t > endBound) return false;
            return true;
        }

        function renderInfractionBadge(type) {
            if (type === 'Late Payment') return { style: 'bg-amber-50 text-amber-700 border-amber-200', icon: '⏰' };
            if (type === 'No Show' || type === 'Drop Out') return { style: 'bg-red-50 text-red-700 border-red-200', icon: '❌' };
            if (type === 'On Time Payment') return { style: 'bg-green-50 text-green-700 border-green-200', icon: '⚡' };
            return { style: 'bg-gray-100 text-gray-700 border-gray-200', icon: '📋' };
        }

        function renderInfractions(records) {
            const container = document.getElementById('infractions-list');
            if (records.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 italic py-6 text-xs">No infractions recorded in this range.</p>`;
                return;
            }
            container.innerHTML = records.map(r => {
                const badge = renderInfractionBadge(r.infraction_type);
                return `
                    <div class="py-3">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] font-black border uppercase px-2 py-0.5 rounded-md ${badge.style}">${badge.icon} ${r.infraction_type}</span>
                            <span class="text-[10px] text-gray-400 font-bold">${formatDateWithDay(r.session_date)}</span>
                        </div>
                        <p class="text-xs text-gray-500 italic">"${r.reason || 'No additional details provided.'}"</p>
                    </div>
                `;
            }).join('');
        }

        function renderSessions(records) {
            const container = document.getElementById('sessions-list');
            if (records.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 italic py-6 text-xs">No completed sessions in this range.</p>`;
                return;
            }
            container.innerHTML = records.map(h => `
                <div class="py-3 flex justify-between items-center">
                    <div>
                        <p class="text-[10px] font-black text-blue-600 uppercase leading-none">${formatDateWithDay(h.session_date)}</p>
                        <p class="font-bold text-gray-800 text-sm mt-1">${h.session_time}</p>
                    </div>
                    <span class="text-[9px] font-bold text-gray-400 uppercase text-right max-w-[120px] truncate">${h.session_location}</span>
                </div>
            `).join('');
        }

        function renderProfileNotes(notes) {
            const container = document.getElementById('profile-notes-list');
            if (notes.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 italic py-4 text-xs">No notes yet.</p>`;
                return;
            }
            container.innerHTML = notes.map(n => `
                <div class="bg-gray-50 p-3 rounded-xl border border-gray-100 text-xs">
                    <p class="text-gray-700 mb-1">${n.note_text}</p>
                    <p class="text-[9px] font-bold text-gray-400 uppercase">${n.created_by || 'Admin'} · ${new Date(n.created_at).toLocaleDateString()}</p>
                </div>
            `).join('');
        }

        function renderUpcomingSessions(records) {
            const container = document.getElementById('upcoming-sessions-list');
            const badge = document.getElementById('upcoming-count-badge');
            badge.innerText = records.length;

            if (records.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 italic py-6 text-xs">No upcoming sessions.</p>`;
                return;
            }

            container.innerHTML = records.map(r => {
                const isWaitlist = r.status === 'Waitlist';
                const timeTag = (r.start_time && r.end_time) ? formatTime12Hour(r.start_time) + ' - ' + formatTime12Hour(r.end_time) : 'N/A';
                const statusBadge = isWaitlist
                    ? `<span class="text-[8px] font-black bg-orange-50 text-orange-600 border border-orange-200 uppercase px-2 py-0.5 rounded-md">Waitlist</span>`
                    : `<span class="text-[8px] font-black bg-green-50 text-green-600 border border-green-200 uppercase px-2 py-0.5 rounded-md">Confirmed</span>`;
                const cancelledTag = r.session_status === 'Cancelled'
                    ? `<span class="text-[8px] font-black bg-red-50 text-red-600 border border-red-200 uppercase px-2 py-0.5 rounded-md ml-1">Cancelled</span>`
                    : '';

                return `
                    <div class="py-3 flex justify-between items-center">
                        <div>
                            <div class="flex items-center gap-1 mb-0.5">
                                ${statusBadge}
                                ${cancelledTag}
                            </div>
                            <p class="text-[10px] font-black text-blue-600 uppercase leading-none">${formatDateWithDay(r.session_date)}</p>
                            <p class="font-bold text-gray-800 text-sm mt-1">${timeTag}</p>
                        </div>
                        <span class="text-[9px] font-bold text-gray-400 uppercase text-right max-w-[120px] truncate">${r.session_location}</span>
                    </div>
                `;
            }).join('');
        }

        function recomputeAndRender() {
            const { startBound, endBound } = getDateBounds();

            document.getElementById('profile-range-label').innerText = (startBound || endBound)
                ? 'Showing filtered date range'
                : 'Showing all-time totals';

            const sessionRows = allSessionRows.filter(h => withinBounds(h.session_date, startBound, endBound));
            const infractionRows = allInfractionRows.filter(r => withinBounds(r.session_date, startBound, endBound));

            document.getElementById('stat-games-played').innerText = sessionRows.length;
            document.getElementById('stat-infraction-count').innerText = infractionRows.length;

            const paymentRecords = infractionRows.filter(r => r.infraction_type === 'On Time Payment' || r.infraction_type === 'Late Payment');
            const onTimeCount = infractionRows.filter(r => r.infraction_type === 'On Time Payment').length;
            const onTimePct = paymentRecords.length > 0 ? Math.round((onTimeCount / paymentRecords.length) * 100) : 0;
            document.getElementById('stat-ontime-pct').innerText = `${onTimePct}%`;

            renderInfractions(infractionRows);
            renderSessions(sessionRows);
        }

        document.getElementById('profile-from-date').addEventListener('change', recomputeAndRender);
        document.getElementById('profile-to-date').addEventListener('change', recomputeAndRender);
        document.getElementById('profile-clear-filters-btn').addEventListener('click', () => {
            document.getElementById('profile-from-date').value = '';
            document.getElementById('profile-to-date').value = '';
            recomputeAndRender();
        });

        document.getElementById('toggle-infractions-btn').addEventListener('click', () => {
            const list = document.getElementById('infractions-list');
            const chevron = document.getElementById('infractions-chevron');
            const isHidden = list.classList.contains('hidden');
            list.classList.toggle('hidden');
            chevron.innerText = isHidden ? '- Hide' : '+ Show';
        });

        document.getElementById('toggle-sessions-btn').addEventListener('click', () => {
            const list = document.getElementById('sessions-list');
            const chevron = document.getElementById('sessions-chevron');
            const isHidden = list.classList.contains('hidden');
            list.classList.toggle('hidden');
            chevron.innerText = isHidden ? '- Hide' : '+ Show';
        });

        (async () => {
            const playerId = new URLSearchParams(window.location.search).get('player');
            if (!playerId) {
                showError();
                return;
            }

            const today = new Date().toISOString().split('T')[0];

            const [{ data: player, error: playerError }, { data: history, error: historyError }, { data: infractions, error: infractionsError }, { data: upcoming, error: upcomingError }, { data: notes, error: notesError }] = await Promise.all([
                _supabase.from('players').select('id, name').eq('id', playerId).maybeSingle(),
                _supabase.from('player_session_history').select('*').eq('player_id', playerId).order('session_date', { ascending: false }),
                _supabase.from('view_attendance_infractions').select('*').eq('player_id', playerId).order('session_date', { ascending: false }),
                // Upcoming sessions aren't covered by player_session_history,
                // since that view only includes Completed sessions with a
                // Confirmed registration. This queries raw registrations
                // joined to sessions instead, so Waitlist and Cancelled
                // sessions remain visible here on purpose.
                _supabase
                    .from('registrations')
                    .select('status, sessions(id, date, start_time, end_time, location, status)')
                    .eq('player_id', playerId)
                    .gte('sessions.date', today),
                _supabase.from('player_notes').select('*').eq('player_id', playerId).order('created_at', { ascending: false })
            ]);

            if (playerError || !player) {
                showError();
                return;
            }

            document.getElementById('manage-notes-link').href = `admin-players.html?edit=${player.id}`;
            renderProfileNotes(notesError ? [] : (notes || []));

            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('profile-content').classList.remove('hidden');
            document.getElementById('player-name-header').innerText = player.name;
            document.getElementById('nav-title').innerText = player.name;

            allSessionRows = historyError ? [] : (history || []);
            allInfractionRows = infractionsError ? [] : (infractions || []);

            // Supabase's gte() filter on a joined column only restricts which
            // *joined* rows are attached, not which top-level rows are
            // returned — a registration whose session falls outside the
            // filter comes back with sessions: null instead of being
            // dropped. Filter those out explicitly, and sort by date.
            const upcomingRows = (upcomingError ? [] : (upcoming || []))
                .filter(r => r.sessions)
                .map(r => ({
                    status: r.status,
                    session_date: r.sessions.date,
                    start_time: r.sessions.start_time,
                    end_time: r.sessions.end_time,
                    session_location: r.sessions.location,
                    session_status: r.sessions.status
                }))
                .sort((a, b) => new Date(a.session_date) - new Date(b.session_date));

            renderUpcomingSessions(upcomingRows);
            recomputeAndRender();
        })();
    </script>
</body>
</html>
