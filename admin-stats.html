<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Player Stats | Admin | Badminton Manager Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900">

    <nav class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex items-center gap-3">
        <a href="admin.html" class="p-1 hover:bg-blue-700 rounded-full transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        </a>
        <h1 class="font-black tracking-tight text-lg uppercase">Player Participation</h1>
    </nav>

    <div class="container mx-auto p-4 max-w-lg space-y-4">
        <div class="flex items-center mb-2">
            <h2 class="text-xl font-black uppercase italic tracking-tighter">Player Stats</h2>
        </div>

        <div class="bg-white p-4 rounded-3xl border border-gray-100 shadow-sm space-y-3">
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="text-[9px] font-black text-gray-400 uppercase ml-1">From Date</label>
                    <input type="date" id="stats-from-date" class="w-full bg-gray-50 p-2.5 rounded-xl border-none ring-1 ring-gray-200 outline-none text-xs">
                </div>
                <div>
                    <label class="text-[9px] font-black text-gray-400 uppercase ml-1">To Date</label>
                    <input type="date" id="stats-to-date" class="w-full bg-gray-50 p-2.5 rounded-xl border-none ring-1 ring-gray-200 outline-none text-xs">
                </div>
            </div>
            <button id="stats-clear-filters-btn" class="w-full text-[10px] font-black text-gray-400 uppercase tracking-widest py-1 hover:text-blue-600 transition-colors">
                Clear Filters (Show All-Time)
            </button>
        </div>

        <p id="stats-range-label" class="text-[10px] font-black text-gray-400 uppercase ml-1"></p>

        <div class="bg-white rounded-3xl border border-gray-100 overflow-hidden shadow-sm">
            <div id="stats-list" class="divide-y divide-gray-50"></div>
        </div>

        <div class="grid grid-cols-2 gap-3 export-controls">
            <button id="export-csv-btn" class="w-full bg-gray-100 text-gray-700 font-black py-3 rounded-2xl uppercase tracking-widest text-[11px]">
                Export CSV
            </button>
            <button id="export-print-btn" class="w-full bg-gray-900 text-white font-black py-3 rounded-2xl uppercase tracking-widest text-[11px]">
                Print
            </button>
        </div>
    </div>

    <div id="print-only-area" class="hidden"></div>

    <style>
        @media print {
            body * { visibility: hidden; }
            #print-only-area, #print-only-area * { visibility: visible; }
            #print-only-area { display: block !important; position: absolute; top: 0; left: 0; width: 100%; }
        }
    </style>

    <script type="module">
        import { requireAdmin } from './js/auth-guard.js';
        import { _supabase } from './js/supabase-client.js';
        import { formatDateWithDay } from './js/format.js';

        if (!requireAdmin()) throw new Error('Not authenticated');

        // Counts here are derived from player_session_history rather than
        // the pre-aggregated player_participation_stats view, because that
        // view's games_played count is computed entirely server-side with
        // no date column to filter by. player_session_history applies the
        // exact same underlying condition (r.status = 'Confirmed' AND
        // s.status = 'Completed'), so an unfiltered count here will match
        // the old cumulative total exactly, while still allowing a
        // client-side date-range filter on top.
        let allHistory = []; // [{ player_id, player_name, session_id, session_date, session_location, session_time }]
        let lastRenderedRows = []; // mirrors exactly what's currently on screen, used by both exports

        function downloadCsv(filename, rows, columns) {
            // columns: [{ key, header }]. Wraps any field containing a comma,
            // quote, or newline in quotes per standard CSV escaping.
            const escapeCell = (val) => {
                const str = String(val ?? '');
                if (/[",\n]/.test(str)) {
                    return `"${str.replace(/"/g, '""')}"`;
                }
                return str;
            };

            const headerLine = columns.map(c => escapeCell(c.header)).join(',');
            const dataLines = rows.map(row => columns.map(c => escapeCell(row[c.key])).join(','));
            const csvContent = [headerLine, ...dataLines].join('\n');

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function exportStatsCsv() {
            if (lastRenderedRows.length === 0) {
                Swal.fire('Nothing to Export', 'No data matches the current filters.', 'info');
                return;
            }
            const { startBound, endBound } = getDateBounds();
            const rangeTag = (startBound || endBound)
                ? `_${document.getElementById('stats-from-date').value || 'start'}_to_${document.getElementById('stats-to-date').value || 'end'}`
                : '_all-time';

            downloadCsv(
                `player-participation${rangeTag}.csv`,
                lastRenderedRows,
                [
                    { key: 'player_name', header: 'Player Name' },
                    { key: 'games_played', header: 'Games Played' }
                ]
            );
        }

        function exportStatsPrint() {
            if (lastRenderedRows.length === 0) {
                Swal.fire('Nothing to Print', 'No data matches the current filters.', 'info');
                return;
            }
            const rangeLabel = document.getElementById('stats-range-label').innerText;

            const rowsHtml = lastRenderedRows.map(s => `
                <tr>
                    <td style="padding:8px;border-bottom:1px solid #e5e7eb;">${s.player_name}</td>
                    <td style="padding:8px;border-bottom:1px solid #e5e7eb;text-align:right;">${s.games_played}</td>
                </tr>
            `).join('');

            document.getElementById('print-only-area').innerHTML = `
                <div style="font-family: sans-serif; padding: 20px;">
                    <h1 style="font-size:18px;margin-bottom:4px;">Player Participation Report</h1>
                    <p style="font-size:11px;color:#666;margin-bottom:16px;">${rangeLabel} &middot; Generated ${new Date().toLocaleString()}</p>
                    <table style="width:100%;border-collapse:collapse;font-size:13px;">
                        <thead>
                            <tr>
                                <th style="text-align:left;padding:8px;border-bottom:2px solid #111;">Player Name</th>
                                <th style="text-align:right;padding:8px;border-bottom:2px solid #111;">Games Played</th>
                            </tr>
                        </thead>
                        <tbody>${rowsHtml}</tbody>
                    </table>
                </div>
            `;
            window.print();
        }

        async function fetchAllHistory() {
            const statsList = document.getElementById('stats-list');
            statsList.innerHTML = `<div class="p-8 text-center text-gray-400 font-bold uppercase text-[10px]">Loading...</div>`;

            try {
                const [{ data: historyData, error: historyError }, { data: playersData, error: playersError }] = await Promise.all([
                    _supabase.from('player_session_history').select('*'),
                    _supabase.from('players').select('id, name')
                ]);

                if (historyError) throw historyError;
                if (playersError) throw playersError;

                const nameById = new Map((playersData || []).map(p => [p.id, p.name]));

                allHistory = (historyData || []).map(h => ({
                    ...h,
                    player_name: nameById.get(h.player_id) || 'Unknown Player'
                }));

                renderPlayerStats();
            } catch (err) {
                console.error("Stats Error:", err);
                statsList.innerHTML = `<div class="p-8 text-center text-red-500 font-bold">Error loading stats</div>`;
            }
        }

        function getDateBounds() {
            const fromVal = document.getElementById('stats-from-date').value;
            const toVal = document.getElementById('stats-to-date').value;
            return {
                startBound: fromVal ? new Date(fromVal).setHours(0, 0, 0, 0) : null,
                endBound: toVal ? new Date(toVal).setHours(23, 59, 59, 999) : null
            };
        }

        function getFilteredHistory() {
            const { startBound, endBound } = getDateBounds();
            if (!startBound && !endBound) return allHistory;

            return allHistory.filter(h => {
                const t = new Date(h.session_date).getTime();
                if (startBound && t < startBound) return false;
                if (endBound && t > endBound) return false;
                return true;
            });
        }

        function renderPlayerStats() {
            const statsList = document.getElementById('stats-list');
            const filtered = getFilteredHistory();
            const { startBound, endBound } = getDateBounds();

            document.getElementById('stats-range-label').innerText = (startBound || endBound)
                ? 'Showing filtered date range'
                : 'Showing all-time totals';

            // Group by player_id, counting rows (= completed, confirmed games).
            const countsByPlayer = new Map();
            filtered.forEach(h => {
                const existing = countsByPlayer.get(h.player_id);
                if (existing) {
                    existing.games_played += 1;
                } else {
                    countsByPlayer.set(h.player_id, { player_id: h.player_id, player_name: h.player_name, games_played: 1 });
                }
            });

            const rows = Array.from(countsByPlayer.values()).sort((a, b) => b.games_played - a.games_played);
            lastRenderedRows = rows;

            if (rows.length === 0) {
                statsList.innerHTML = `<p class="text-center text-gray-400 italic py-8 text-xs">No completed sessions in this range.</p>`;
                return;
            }

            statsList.innerHTML = rows.map(s => `
                <div class="stats-row flex items-center justify-between p-5 border-b border-gray-50 hover:bg-blue-50 transition-all cursor-pointer group"
                    data-player-id="${s.player_id}" data-player-name="${s.player_name}">
                    <div class="flex flex-col">
                        <span class="font-bold text-gray-800 group-hover:text-blue-600">${s.player_name}</span>
                        <span class="text-[9px] text-gray-400 uppercase font-black tracking-widest">Click for history</span>
                    </div>
                    <div class="flex items-center bg-blue-50 px-4 py-2 rounded-2xl border border-blue-100 group-hover:bg-blue-600 group-hover:border-blue-600 transition-colors">
                        <span class="text-sm font-black text-blue-600 mr-1 group-hover:text-white">${s.games_played}</span>
                        <span class="text-[10px] font-black text-blue-400 uppercase group-hover:text-blue-100">Games</span>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.stats-row').forEach(row =>
                row.addEventListener('click', () => {
                    window.location.href = `admin-player-detail.html?player=${row.dataset.playerId}`;
                }));
        }

        document.getElementById('stats-from-date').addEventListener('change', renderPlayerStats);
        document.getElementById('stats-to-date').addEventListener('change', renderPlayerStats);
        document.getElementById('stats-clear-filters-btn').addEventListener('click', () => {
            document.getElementById('stats-from-date').value = '';
            document.getElementById('stats-to-date').value = '';
            renderPlayerStats();
        });
        document.getElementById('export-csv-btn').addEventListener('click', exportStatsCsv);
        document.getElementById('export-print-btn').addEventListener('click', exportStatsPrint);

        fetchAllHistory();
    </script>
</body>
</html>
