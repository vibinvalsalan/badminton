<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Badminton Manager Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .animate-fadeIn { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900">

    <nav class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <h1 class="font-black tracking-tight text-lg uppercase">🏸 Badminton</h1>
        <a href="admin-login.html" class="text-[10px] font-black bg-blue-800 px-3 py-1.5 rounded-lg uppercase tracking-widest">Admin</a>
    </nav>

    <div class="container mx-auto p-4 max-w-lg animate-fadeIn">
        <h2 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-4">Available Sessions</h2>
        <div id="session-list" class="space-y-3"></div>
        <div id="empty-state" class="hidden text-center py-16">
            <p class="text-gray-400 font-bold uppercase text-[10px]">No upcoming sessions</p>
        </div>
        <p class="text-[10px] text-gray-400 text-center mt-8">Version: #BUILD_NUMBER#</p>
    </div>

    <script type="module">
        import { loadData } from './js/data.js';
        import { state } from './js/state.js';
        import { formatDateWithDay, formatTime12Hour } from './js/format.js';
        import { logVisit } from './js/audit.js';

        function renderSessions() {
            const list = document.getElementById('session-list');
            const emptyState = document.getElementById('empty-state');
            list.innerHTML = '';

            const today = new Date().setHours(0, 0, 0, 0);

            const upcoming = state.allData
                .filter(s => {
                    const isFuture = new Date(s.date).setHours(0, 0, 0, 0) >= today;
                    return isFuture && s.is_visible !== false;
                })
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            if (upcoming.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }

            upcoming.forEach(s => {
                const spotsLeft = Math.max(0, s.capacity - s.players.length);
                const waitlistCount = s.waitlist ? s.waitlist.length : 0;
                const paidCount = s.players.filter(p => p.payment_status === 'Paid').length;

                const statusBadge = s.status === 'Cancelled'
                    ? `<span class="bg-red-100 text-red-600 px-2 py-1 rounded-md text-[10px] font-bold">CANCELLED</span>`
                    : s.status === 'Completed'
                    ? `<span class="bg-gray-100 text-gray-600 px-2 py-1 rounded-md text-[10px] font-bold">COMPLETED</span>`
                    : '';

                const displayTime = (s.start_time && s.end_time)
                    ? `${formatTime12Hour(s.start_time)} - ${formatTime12Hour(s.end_time)}`
                    : 'N/A';

                const card = document.createElement('a');
                card.href = `session.html?session=${s.id}`;
                card.className = "block bg-white p-4 rounded-3xl shadow-sm border border-gray-100 flex items-center gap-4 cursor-pointer hover:shadow-md transition-all active:scale-[0.98] mb-3";

                card.innerHTML = `
                    <div class="flex-shrink-0 w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center text-xl">🏸</div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-start mb-1">
                            <div>
                                <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">${formatDateWithDay(s.date)}</p>
                                <h3 class="text-lg font-black text-gray-900 leading-tight">${displayTime}</h3>
                                ${statusBadge}
                            </div>
                            <span class="text-[9px] font-black px-2 py-1 rounded-full uppercase ${spotsLeft > 0 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'}">
                                ${spotsLeft > 0 ? spotsLeft + ' Left' : 'Full'}
                            </span>
                        </div>
                        <div class="flex items-center gap-1.5 mb-1">
                            <svg class="w-3 h-3 text-gray-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                            <p class="text-xs text-gray-400 truncate">${s.location}</p>
                        </div>
                        <div class="flex items-center gap-2 text-[10px] font-bold text-gray-400 uppercase tracking-tight">
                            <span>FEE: <span class="${s.fee.toLowerCase() === 'tbc' ? 'text-yellow-600' : 'text-blue-600'}">${s.fee}</span></span>
                            <span class="text-gray-200">•</span>
                            <span>PLAYERS: <span class="text-gray-600">${s.players.length}/${s.capacity}</span></span>
                            <span class="text-gray-200">•</span>
                            <span>PAID: <span class="text-gray-600">${paidCount}/${s.players.length}</span></span>
                        </div>
                        ${waitlistCount > 0 ? `
                            <div class="mt-2 flex items-center gap-1">
                                <div class="w-1.5 h-1.5 rounded-full bg-orange-400 animate-pulse"></div>
                                <p class="text-[9px] font-black text-orange-500 uppercase">${waitlistCount} on waiting list</p>
                            </div>
                        ` : ''}
                    </div>`;

                list.appendChild(card);
            });
        }

        (async () => {
            await logVisit();
            await loadData();
            renderSessions();
        })();
    </script>
</body>
</html>
