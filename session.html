<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Session Details | Badminton Manager Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .animate-fadeIn { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card-border-top { border-top: 4px solid #ef4444; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-900">

    <nav class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <a href="index.html" class="p-1 hover:bg-blue-700 rounded-full transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </a>
            <h1 class="font-black tracking-tight text-lg uppercase">🏸 Session Details</h1>
        </div>
        <a href="admin.html" id="admin-nav-btn" class="text-[10px] font-black bg-blue-800 px-3 py-1.5 rounded-lg uppercase tracking-widest hidden">Admin</a>
    </nav>

    <div class="container mx-auto p-4 max-w-lg">
        <div id="session-detail-content" class="animate-fadeIn"></div>
        <div id="loading-state" class="text-center py-16 text-gray-400 font-bold uppercase text-[10px]">Loading session...</div>
        <div id="error-state" class="hidden text-center py-16 text-red-400 font-bold">Session not found.</div>
    </div>

    <script type="module">
        import { _supabase } from './js/supabase-client.js';
        import { state } from './js/state.js';
        import { loadData } from './js/data.js';
        import { formatDateWithDay, formatTime12Hour } from './js/format.js';
        import { logVisit } from './js/audit.js';
        import { toggleSessionLogs } from './js/audit.js';
        import { renderPlayerRow, handlePayment, handleRemoval, promoteFromWaitlist, joinSession, toggleJoinButton, validateAndJoin, filterPlayers } from './js/participants.js';
        import { copyToWhatsApp } from './js/whatsapp.js';

        // Expose functions needed by inline onclick handlers in rendered HTML.
        // In a module script, functions are not automatically global — any
        // function referenced by onclick="fn()" in innerHTML must be explicitly
        // attached to window.
        window.handlePayment    = (id, status)          => handlePayment(id, status, refresh);
        window.handleRemoval    = (id, sid, name)        => handleRemoval(id, sid, name, refresh);
        window.promoteFromWaitlist = (id, sid, name)     => promoteFromWaitlist(id, sid, name, refresh);
        window.toggleJoinButton = toggleJoinButton;
        window.validateAndJoin  = ()                     => validateAndJoin(refresh);
        window.filterPlayers    = filterPlayers;
        window.copyToWhatsApp   = copyToWhatsApp;
        window.toggleSessionLogs = toggleSessionLogs;
        window.openNativeShare  = openNativeShare;

        function openNativeShare() {
            const s = state.allData.find(x => x.id === state.currentSessionId);
            if (!s) return;
            // Build the link relative to this page's own directory, so it
            // works whether the site is served from a domain root or from
            // a GitHub Pages project subpath like /badminton/.
            const basePath = window.location.pathname.replace(/[^/]*$/, '');
            const directLink = `${window.location.origin}${basePath}session.html?session=${s.short_id}`;

            if (navigator.share) {
                navigator.share({
                    title: 'Join my Badminton Session!',
                    text: `Click here to join the session on ${formatDateWithDay(s.date)}:`,
                    url: directLink
                }).catch(console.error);
            } else {
                navigator.clipboard.writeText(directLink);
                Swal.fire({ toast: true, position: 'top', icon: 'success', title: 'Link copied!', showConfirmButton: false, timer: 1500 });
            }
        }

        async function refresh() {
            await loadData();
            renderDetailPage();
        }

        function renderDetailPage() {
            const s = state.allData.find(x => x.id === state.currentSessionId);

            document.getElementById('loading-state').classList.add('hidden');

            if (!s) {
                document.getElementById('error-state').classList.remove('hidden');
                return;
            }

            const totalConfirmed = s.players.length;
            const totalPaid = s.players.filter(p => p.payment_status === 'Paid').length;
            const detailTime = (s.start_time && s.end_time)
                ? `${formatTime12Hour(s.start_time)} - ${formatTime12Hour(s.end_time)}`
                : 'N/A';

            const isFeeTBC = !s.fee || s.fee.toLowerCase() === 'tbc';
            const feeDisplay = isFeeTBC
                ? `<span class="bg-yellow-100 text-yellow-800 px-2 py-0.5 rounded-full text-[10px] font-bold uppercase">Pending</span>`
                : `<span class="text-blue-600 font-bold">${s.fee}</span>`;

            document.getElementById('session-detail-content').innerHTML = `
                <div class="bg-white rounded-3xl shadow-xl p-6 card-border-top animate-fadeIn">
                    <div class="flex justify-between items-start mb-6">
                        <div class="space-y-1">
                            <p class="text-xl font-semibold text-gray-800">${formatDateWithDay(s.date)}</p>
                            <p class="text-lg text-gray-600 font-medium">${detailTime}</p>
                            <div class="flex items-center gap-1 pt-1">
                                <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                <a href="#" class="text-blue-600 hover:underline text-sm font-medium">Venue: ${s.location}</a>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="copyToWhatsApp()" class="p-2 bg-gray-50 rounded-xl hover:bg-gray-100 text-gray-500" title="Copy to WhatsApp">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                            </button>
                            <button onclick="openNativeShare()" class="p-2 bg-gray-50 rounded-xl hover:bg-gray-100 text-gray-500" title="Share">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                            </button>
                        </div>
                    </div>

                    <div class="flex flex-wrap gap-4 mb-8 text-xs font-bold uppercase tracking-wider text-gray-400">
                        <div>Fee: ${feeDisplay}</div>
                        <div>Players: <span class="text-blue-600">${totalConfirmed}/${s.capacity}</span></div>
                        <div>Paid: <span class="text-blue-600">${totalPaid}/${totalConfirmed}</span></div>
                    </div>

                    ${state.isAdmin && s.admin_notes ? `
                    <div class="mt-4 p-4 bg-yellow-50 border-l-4 border-yellow-400 rounded-r-xl mb-6">
                        <p class="text-[10px] font-black text-yellow-700 uppercase mb-1">Admin Internal Note:</p>
                        <p class="text-sm text-yellow-900 italic">"${s.admin_notes}"</p>
                    </div>
                    ` : ''}

                    ${s.special_instruction ? `
                    <div class="mb-6 p-3 bg-orange-50 border border-orange-100 rounded-2xl flex gap-3 items-center">
                        <span class="text-xl">⚠️</span>
                        <p class="text-xs text-orange-800 font-medium">${s.special_instruction}</p>
                    </div>
                    ` : ''}

                    <div class="bg-blue-50 p-4 rounded-2xl mb-6 border border-blue-100">
                        <h4 class="text-[10px] font-black text-blue-600 uppercase mb-2">Instructions</h4>
                        <ul class="text-[11px] text-blue-800 space-y-2 leading-relaxed">
                            <li class="flex gap-2"><span class="font-bold">1.</span><span><strong>Want to play?</strong> Select your name and click <strong class="text-blue-600">Join</strong> to secure your spot.</span></li>
                            <li class="flex gap-2"><span class="font-bold">2.</span><span><strong>Fee Paid already?</strong> Click (<strong class="text-blue-600">Mark Paid</strong>) button when you have sent your fee to the organizer.</span></li>
                            <li class="flex gap-2"><span class="font-bold">3.</span><span><strong>Made a mistake with payment update?</strong> Tap the (<strong class="text-green-600">✓ Paid</strong>) button again to revert to unpaid.</span></li>
                            <li class="flex gap-2"><span class="font-bold">4.</span><span><strong>Unable to attend the session?</strong> Click the <strong class="text-red-500">✕</strong> icon on the far right of your name to leave the session.</span></li>
                        </ul>
                    </div>

                    <div class="mb-8">
                        <div class="flex gap-3">
                            <div class="flex-1 relative">
                                <input type="text" id="join-player-search" autocomplete="off" placeholder="Type your name..."
                                    class="w-full bg-gray-50 rounded-2xl px-5 py-4 outline-none text-sm border-2 border-transparent transition-all">
                                <input type="hidden" id="join-player-id" value="">
                                <div id="join-player-suggestions"
                                    class="hidden absolute z-20 left-0 right-0 mt-1 bg-white rounded-2xl shadow-xl border border-gray-100 max-h-56 overflow-y-auto"></div>
                                <p id="join-error" class="hidden text-red-500 text-[10px] mt-1 ml-2 font-bold">Please select a name to continue.</p>
                            </div>
                            <button id="join-btn" onclick="validateAndJoin()"
                                class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black uppercase opacity-50 cursor-not-allowed transition-all hover:bg-blue-700" disabled>
                                Join
                            </button>
                        </div>
                    </div>

                    <div class="flex justify-between items-center mb-3">
                        <p class="text-[10px] font-black text-gray-400 uppercase">Participants</p>
                        <div class="flex bg-gray-100 p-1 rounded-lg gap-1">
                            <button onclick="filterPlayers('all')" id="btn-filter-all" class="text-[9px] font-bold px-2 py-1 rounded-md bg-white shadow-sm transition-all">All</button>
                            <button onclick="filterPlayers('Paid')" id="btn-filter-paid" class="text-[9px] font-bold px-2 py-1 rounded-md text-gray-500 transition-all">Paid</button>
                            <button onclick="filterPlayers('Unpaid')" id="btn-filter-unpaid" class="text-[9px] font-bold px-2 py-1 rounded-md text-gray-500 transition-all">Unpaid</button>
                        </div>
                    </div>

                    <div id="participants-list-container">
                        ${s.players.map(p => renderPlayerRow(p, s)).join('')}
                    </div>

                    ${s.waitlist.length > 0 ? `
                        <p class="text-[10px] font-black text-gray-400 uppercase pt-6 mb-3">Waitlist</p>
                        ${s.waitlist.map(p => `
                            <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl mb-2">
                                <span class="text-gray-500 text-sm italic">${p.player_name}</span>
                                <div class="flex items-center gap-2">
                                    ${state.isAdmin ? `
                                        <button onclick="promoteFromWaitlist('${p.id}', '${s.id}', '${p.player_name}')"
                                            class="text-[9px] px-2 py-1.5 rounded-lg font-black bg-blue-100 text-blue-700 uppercase hover:bg-blue-200 transition-colors">
                                            Promote
                                        </button>
                                    ` : ''}
                                    <button onclick="handleRemoval('${p.id}', '${s.id}', '${p.player_name}')"
                                        class="text-red-200 hover:text-red-400 transition-colors pl-2 border-l border-gray-200">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    ` : ''}

                    ${state.isAdmin ? `
                    <div class="mt-8 pt-6 border-t border-gray-100">
                        <button onclick="toggleSessionLogs('${s.id}')"
                            class="w-full flex justify-between items-center text-[10px] font-black text-gray-400 uppercase tracking-widest hover:text-blue-600 transition-colors">
                            <span>Session Audit Log (Admin Only)</span>
                            <span id="log-chevron-${s.id}">+ Show</span>
                        </button>
                        <div id="session-log-container-${s.id}" class="hidden mt-4 space-y-2 max-h-60 overflow-y-auto pr-2">
                            <p class="text-center text-[10px] text-gray-400 italic py-4">Loading logs...</p>
                        </div>
                    </div>
                    ` : ''}
                </div>
            `;

            setupPlayerSearchCombobox();
        }

        // Wires up the searchable player-name combobox: typing filters the
        // suggestion list by substring match, clicking a suggestion selects
        // that player (storing their id in the hidden #join-player-id field,
        // which toggleJoinButton()/joinSession() already read from). Called
        // every time renderDetailPage() runs, since innerHTML replacement
        // wipes out any previously attached listeners.
        function setupPlayerSearchCombobox() {
            const searchInput = document.getElementById('join-player-search');
            const suggestionsBox = document.getElementById('join-player-suggestions');
            const hiddenIdInput = document.getElementById('join-player-id');
            if (!searchInput) return;

            function renderSuggestions(query) {
                const q = query.trim().toLowerCase();
                const matches = q
                    ? state.masterPlayers.filter(p => p.name.toLowerCase().includes(q))
                    : state.masterPlayers;

                if (matches.length === 0) {
                    suggestionsBox.innerHTML = `<p class="text-xs text-gray-400 italic px-4 py-3">No matching players</p>`;
                } else {
                    suggestionsBox.innerHTML = matches.map(p => `
                        <button type="button" data-id="${p.id}" data-name="${p.name}"
                            class="player-suggestion-item w-full text-left px-4 py-2.5 text-sm hover:bg-blue-50 transition-colors">
                            ${p.name}
                        </button>
                    `).join('');
                }
                suggestionsBox.classList.remove('hidden');

                suggestionsBox.querySelectorAll('.player-suggestion-item').forEach(btn => {
                    btn.addEventListener('click', () => {
                        hiddenIdInput.value = btn.dataset.id;
                        searchInput.value = btn.dataset.name;
                        suggestionsBox.classList.add('hidden');
                        toggleJoinButton();
                    });
                });
            }

            searchInput.addEventListener('focus', () => renderSuggestions(searchInput.value));
            searchInput.addEventListener('input', () => {
                // Typing invalidates any previously selected player until
                // they pick a fresh match from the list again.
                hiddenIdInput.value = '';
                toggleJoinButton();
                renderSuggestions(searchInput.value);
            });

            // Hide suggestions when clicking outside the combobox.
            document.addEventListener('click', (e) => {
                if (!searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
                    suggestionsBox.classList.add('hidden');
                }
            });
        }

        // --- init ---
        (async () => {
            await logVisit();
            await loadData();

            const shortId = new URLSearchParams(window.location.search).get('session');
            const s = shortId ? state.allData.find(x => x.short_id === shortId) : null;
            if (!s) {
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('error-state').classList.remove('hidden');
                return;
            }

            // Downstream code (renderPlayerRow, handlePayment, handleRemoval,
            // audit logging, etc.) all key off state.currentSessionId and
            // write it as the session_id foreign key, so it must hold the
            // real UUID -- never the short code from the URL.
            state.currentSessionId = s.id;

            // Show Admin nav button if logged in as admin
            if (state.isAdmin) {
                document.getElementById('admin-nav-btn').classList.remove('hidden');
            }

            renderDetailPage();
        })();
    </script>
</body>
</html>
